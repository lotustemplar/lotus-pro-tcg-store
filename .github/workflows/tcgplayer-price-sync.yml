name: TCGPlayer Price Sync

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: tcgplayer-price-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify DATABASE_URL secret
        run: |
          node -e "if (!process.env.DATABASE_URL || !process.env.DATABASE_URL.trim()) { console.error('GitHub Actions secret DATABASE_URL is missing or empty. Update it in Settings > Secrets and variables > Actions.'); process.exit(1); }"

      - name: Run scheduled sync
        run: npm run sync:tcgplayer
